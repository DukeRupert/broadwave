{{define "content"}}
<div class="mb-6">
    <a href="/admin/" class="text-sm text-blue-600 hover:text-blue-800">&larr; Back to Dashboard</a>
</div>

<h1 class="text-2xl font-bold text-gray-800 mb-6">Compose Message</h1>

<div x-data="{
    showHTML: false,
    listName: '',
    subCount: 0,
    confirmSend: false,
    updateListInfo() {
        const sel = this.$refs.listSelect;
        const opt = sel.options[sel.selectedIndex];
        this.listName = opt ? opt.text : '';
        this.subCount = opt ? parseInt(opt.dataset.count || '0') : 0;
    }
}" x-init="updateListInfo()">

    <form method="POST" action="/admin/compose/send" @submit.prevent="confirmSend = true">
        <div class="bg-white rounded-lg shadow p-6 space-y-4">
            <!-- List selection -->
            <div>
                <label for="list_id" class="block text-sm font-medium text-gray-700 mb-1">List</label>
                <select id="list_id" name="list_id" required x-ref="listSelect" @change="updateListInfo()"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
                    {{range .Lists}}
                    <option value="{{.ID}}" data-count="{{.ConfirmedCount}}" {{if eq .ID $.PreselectedListID}}selected{{end}}>
                        {{.Name}} ({{.ConfirmedCount}} confirmed)
                    </option>
                    {{end}}
                </select>
            </div>

            <!-- Subject -->
            <div>
                <label for="subject" class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                <input type="text" id="subject" name="subject" required placeholder="Your email subject"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            </div>

            <!-- Plain text body -->
            <div>
                <label for="body_text" class="block text-sm font-medium text-gray-700 mb-1">
                    Plain Text Body
                    <span class="text-gray-400 font-normal">— use {{`{{name}}`}}, {{`{{email}}`}}, {{`{{unsubscribe_url}}`}}</span>
                </label>
                <textarea id="body_text" name="body_text" required rows="10" placeholder="Write your message here..."
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
            </div>

            <!-- HTML body (collapsible) -->
            <div>
                <button type="button" @click="showHTML = !showHTML"
                    class="text-sm text-blue-600 hover:text-blue-800 flex items-center space-x-1">
                    <span x-text="showHTML ? 'Hide' : 'Show'"></span>
                    <span>HTML Body (optional)</span>
                </button>
                <div x-show="showHTML" x-cloak class="mt-2">
                    <textarea id="body_html" name="body_html" rows="10" placeholder="Optional HTML version..."
                        class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm font-mono focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center space-x-3 pt-2">
                <button type="button"
                    hx-post="/admin/compose/preview"
                    hx-include="closest form"
                    hx-target="#preview-area"
                    hx-swap="innerHTML"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Preview
                </button>
                <button type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Send Message
                </button>
            </div>
        </div>

        <!-- Confirmation modal -->
        <div x-show="confirmSend" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
            <div class="bg-white rounded-lg shadow-lg p-6 max-w-md w-full mx-4" @click.away="confirmSend = false">
                <h3 class="text-lg font-semibold text-gray-800 mb-2">Confirm Send</h3>
                <p class="text-sm text-gray-600 mb-4">
                    Send this message to <strong x-text="subCount"></strong> confirmed subscribers on <strong x-text="listName"></strong>?
                </p>
                <div class="flex justify-end space-x-3">
                    <button type="button" @click="confirmSend = false"
                        class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
                        Cancel
                    </button>
                    <button type="button" @click="confirmSend = false; $el.closest('form').removeEventListener('submit', arguments.callee); $el.closest('form').submit();"
                        class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700">
                        Yes, Send
                    </button>
                </div>
            </div>
        </div>
    </form>

    <!-- Preview area -->
    <div id="preview-area" class="mt-6"></div>
</div>

<style>[x-cloak] { display: none !important; }</style>
{{end}}
