{{define "content"}}
<div class="mb-6">
    <a href="/admin/" class="text-sm text-blue-600 hover:text-blue-800">&larr; Back to Dashboard</a>
</div>

<h1 class="text-2xl font-bold text-gray-800 mb-6">Create List</h1>

<form method="POST" action="/admin/lists/create">
    <div class="bg-white rounded-lg shadow p-6 space-y-4">
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" required placeholder="My Newsletter"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div>
            <label for="slug" class="block text-sm font-medium text-gray-700 mb-1">Slug</label>
            <input type="text" id="slug" name="slug" required placeholder="my-newsletter" pattern="[a-z0-9\-]+"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <p class="mt-1 text-xs text-gray-500">Lowercase letters, numbers, and hyphens only.</p>
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Description <span class="text-gray-400 font-normal">(optional)</span></label>
            <textarea id="description" name="description" rows="3" placeholder="A short description of this list..."
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"></textarea>
        </div>

        <div>
            <label for="from_name" class="block text-sm font-medium text-gray-700 mb-1">From Name</label>
            <input type="text" id="from_name" name="from_name" required placeholder="Acme Inc."
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div>
            <label for="from_email" class="block text-sm font-medium text-gray-700 mb-1">From Email</label>
            <input type="email" id="from_email" name="from_email" required placeholder="newsletter@example.com"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>

        <div class="pt-2">
            <button type="submit"
                class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                Create List
            </button>
        </div>
    </div>
</form>
{{end}}
