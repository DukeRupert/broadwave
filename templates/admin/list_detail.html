{{define "content"}}
<div class="mb-6">
    <a href="/admin/" class="text-sm text-blue-600 hover:text-blue-800">&larr; Back to Dashboard</a>
</div>

<div class="flex items-center justify-between mb-6">
    <div>
        <h1 class="text-2xl font-bold text-gray-800">{{.List.Name}}</h1>
        {{if .List.Description}}
        <p class="text-sm text-gray-500 mt-1">{{.List.Description}}</p>
        {{end}}
    </div>
    <a href="/admin/lists/{{.List.ID}}/export"
        class="inline-flex items-center px-3 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50">
        Export CSV
    </a>
</div>

<!-- Filter tabs -->
<div class="flex space-x-1 mb-4 border-b border-gray-200">
    {{$listID := .List.ID}}
    {{$current := .StatusFilter}}
    <a href="/admin/lists/{{$listID}}"
        hx-get="/admin/lists/{{$listID}}"
        hx-target="#subscriber-table"
        hx-push-url="true"
        class="px-4 py-2 text-sm font-medium border-b-2 -mb-px {{if eq $current ""}}border-blue-500 text-blue-600{{else}}border-transparent text-gray-500 hover:text-gray-700{{end}}">
        All
    </a>
    <a href="/admin/lists/{{$listID}}?status=confirmed"
        hx-get="/admin/lists/{{$listID}}?status=confirmed"
        hx-target="#subscriber-table"
        hx-push-url="true"
        class="px-4 py-2 text-sm font-medium border-b-2 -mb-px {{if eq $current "confirmed"}}border-blue-500 text-blue-600{{else}}border-transparent text-gray-500 hover:text-gray-700{{end}}">
        Confirmed
    </a>
    <a href="/admin/lists/{{$listID}}?status=pending"
        hx-get="/admin/lists/{{$listID}}?status=pending"
        hx-target="#subscriber-table"
        hx-push-url="true"
        class="px-4 py-2 text-sm font-medium border-b-2 -mb-px {{if eq $current "pending"}}border-blue-500 text-blue-600{{else}}border-transparent text-gray-500 hover:text-gray-700{{end}}">
        Pending
    </a>
    <a href="/admin/lists/{{$listID}}?status=unsubscribed"
        hx-get="/admin/lists/{{$listID}}?status=unsubscribed"
        hx-target="#subscriber-table"
        hx-push-url="true"
        class="px-4 py-2 text-sm font-medium border-b-2 -mb-px {{if eq $current "unsubscribed"}}border-blue-500 text-blue-600{{else}}border-transparent text-gray-500 hover:text-gray-700{{end}}">
        Unsubscribed
    </a>
</div>

<!-- Add subscriber form -->
<div class="bg-white rounded-lg shadow p-4 mb-4">
    <form method="POST" action="/admin/lists/{{.List.ID}}/subscribers" class="flex items-end space-x-3">
        <div class="flex-1">
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" id="email" name="email" required placeholder="subscriber@example.com"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <div class="flex-1">
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input type="text" id="name" name="name" placeholder="Optional"
                class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
        </div>
        <button type="submit"
            class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Add
        </button>
    </form>
</div>

<!-- Subscriber table -->
<div id="subscriber-table">
    {{template "subscriber_table" .}}
</div>
{{end}}
